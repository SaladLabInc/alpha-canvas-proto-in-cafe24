<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>알파캔버스 빌더 — 인터랙티브 디자인 클론 (canvas 45)</title>
<style>
  /* ===== Design tokens (실제 빌더에서 추출) ===== */
  :root{
    --font:"Pretendard Variable",Pretendard,"Noto Sans KR",-apple-system,sans-serif;
    --ink:#2E2E31; --ink-sub:#5E5E61; --ink-faint:#9EA1A7; --ink-mute:#71757b;
    --line:#E9ECEE; --line-soft:#F0F1F3;
    --appbar-bg:#E9ECEE; --gnb-bg:#F9F9FA; --soft-bg:#F6F7F8; --canvas-bg:#F1F3F5; --white:#fff;
    --accent:#837AFF; --accent-bg:#EEEDFF; --accent-deep:#4E44CE;
    --gold:#C9A961;
    --r-sm:6px; --r:10px; --r-lg:14px;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ min-height:100%; }
  body{ font-family:var(--font); font-size:14px; color:var(--ink); -webkit-font-smoothing:antialiased;
    background:linear-gradient(160deg,#fbfdff 0%,#f4f9ff 55%,#eef6ff 100%); background-attachment:fixed;
    position:relative; overflow-x:hidden; }
  /* 아주 옅은 하늘색 — 떠다니는 블롭 2개가 화면을 가로질러 움직임 */
  body::before, body::after{ content:''; position:fixed; z-index:0; pointer-events:none; border-radius:50%; filter:blur(70px); will-change:transform; }
  body::before{ width:64vw; height:64vw; left:-12vw; top:-16vw;
    background:radial-gradient(circle, rgba(150,196,255,.42), rgba(150,196,255,0) 70%);
    animation:blobA 8s ease-in-out infinite alternate, skyIn 1.6s ease both; }
  body::after{ width:58vw; height:58vw; right:-14vw; bottom:-18vw;
    background:radial-gradient(circle, rgba(122,178,255,.36), rgba(122,178,255,0) 70%);
    animation:blobB 14.5s ease-in-out infinite alternate, skyIn 1.9s ease both; }
  @keyframes skyIn{ from{ opacity:0 } to{ opacity:1 } }
  @keyframes blobA{ 0%{ transform:translate(0,0) scale(1) } 100%{ transform:translate(36vw,26vh) scale(1.18) } }
  @keyframes blobB{ 0%{ transform:translate(0,0) scale(1) } 100%{ transform:translate(-34vw,-22vh) scale(1.12) } }
  @media (prefers-reduced-motion:reduce){ body::before,body::after{ animation:skyIn 1.6s ease both } }
  /* 대비되는 따뜻한 색(피치/핑크) 블롭 2개 */
  .bg-warm{ position:fixed; inset:0; z-index:0; pointer-events:none; }
  .bg-warm::before, .bg-warm::after{ content:''; position:fixed; z-index:0; pointer-events:none; border-radius:50%; filter:blur(72px); will-change:transform; }
  .bg-warm::before{ width:56vw; height:56vw; right:-14vw; top:-16vw;
    background:radial-gradient(circle, rgba(255,178,170,.34), rgba(255,178,170,0) 70%);
    animation:blobC 11s ease-in-out infinite alternate, skyIn 1.8s ease both; }
  .bg-warm::after{ width:52vw; height:52vw; left:-13vw; bottom:-17vw;
    background:radial-gradient(circle, rgba(255,201,164,.30), rgba(255,201,164,0) 70%);
    animation:blobD 18s ease-in-out infinite alternate, skyIn 2.1s ease both; }
  @keyframes blobC{ 0%{ transform:translate(0,0) scale(1) } 100%{ transform:translate(-32vw,24vh) scale(1.14) } }
  @keyframes blobD{ 0%{ transform:translate(0,0) scale(1) } 100%{ transform:translate(30vw,-20vh) scale(1.1) } }
  @media (prefers-reduced-motion:reduce){ .bg-warm::before,.bg-warm::after{ animation:skyIn 1.8s ease both } }
  /* 녹색 계열 블롭 1개 */
  .bg-green{ position:fixed; inset:0; z-index:0; pointer-events:none; }
  .bg-green::before{ content:''; position:fixed; z-index:0; pointer-events:none; border-radius:50%; filter:blur(74px); will-change:transform;
    width:54vw; height:54vw; left:24vw; top:34vh;
    background:radial-gradient(circle, rgba(140,214,170,.30), rgba(140,214,170,0) 70%);
    animation:blobE 13s ease-in-out infinite alternate, skyIn 2s ease both; }
  @keyframes blobE{ 0%{ transform:translate(0,0) scale(1) } 100%{ transform:translate(-24vw,-26vh) scale(1.16) } }
  @media (prefers-reduced-motion:reduce){ .bg-green::before{ animation:skyIn 2s ease both } }

  /* ===== altalt 스타일 쇼케이스: 배경 위 플로팅 윈도우 + 상단 모드 탭 ===== */
  .showcase{ position:relative; z-index:1; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; gap:16px; padding:22px 18px 34px; box-sizing:border-box; }
  .showcase__tabs{ display:inline-flex; gap:4px; padding:5px; border-radius:999px; background:rgba(255,255,255,.45); box-shadow:0 2px 10px rgba(0,0,0,.08); backdrop-filter:blur(8px); }
  .sc-tab{ padding:9px 22px; border-radius:999px; font-size:14.5px; font-weight:600; color:#6b6155; transition:background .18s, color .18s, box-shadow .18s; }
  .sc-tab:hover{ color:#3a342c; }
  .sc-tab.on{ background:#fff; color:#2a2d38; box-shadow:0 2px 8px rgba(0,0,0,.14); }
  .showcase__window{ position:relative; width:min(96vw, 1632px); aspect-ratio:1440 / 900; border-radius:18px; overflow:hidden;
    background:#fff; box-shadow:0 34px 90px rgba(60,45,25,.28), 0 6px 20px rgba(60,45,25,.14); }
  .showcase__cta{ text-align:center; margin-top:8px; max-width:760px; }
  .showcase__cta-points{ display:inline-flex; align-items:center; gap:12px; flex-wrap:wrap; justify-content:center; font-size:13.5px; font-weight:600; color:#5b5040; }
  .showcase__cta-points i{ width:3px; height:3px; border-radius:50%; background:#b3a58d; display:inline-block; }
  .showcase__cta-line{ margin:14px 0 16px; font-size:16px; color:#4a4235; } .showcase__cta-line b{ color:#2a2418; }
  .showcase__cta-btn{ font-family:inherit; cursor:pointer; border:none; background:#2a2418; color:#fff; font-size:15px; font-weight:700; padding:13px 30px; border-radius:999px; box-shadow:0 6px 18px rgba(42,36,24,.28); transition:transform .1s, background .15s; }
  .showcase__cta-btn:hover{ background:#413828; } .showcase__cta-btn:active{ transform:translateY(1px); }
  /* ===== 진입 웰컴 모달 — 미니멀 다크 글래스 ===== */
  .welcome{ position:absolute; inset:0; z-index:60; display:flex; align-items:center; justify-content:center;
    background:rgba(10,9,7,.42); backdrop-filter:blur(6px) saturate(1.1); animation:wcFade .3s ease; }
  .welcome[hidden]{ display:none; }
  @keyframes wcFade{ from{opacity:0} to{opacity:1} }
  .welcome__card{ position:relative; width:min(92%, 560px); padding:40px 40px 26px; text-align:left;
    border-radius:24px; background:linear-gradient(160deg, rgba(96,99,110,.94), rgba(56,59,69,.97));
    border:1px solid rgba(255,255,255,.12); box-shadow:0 30px 90px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.08);
    backdrop-filter:blur(16px) saturate(1.2); color:#fff; animation:wcPop .4s cubic-bezier(.2,.85,.25,1); overflow:hidden; }
  @keyframes wcPop{ from{opacity:0; transform:translateY(14px) scale(.97)} to{opacity:1; transform:none} }
  .welcome__badge{ display:inline-flex; align-items:center; gap:6px; padding:6px 14px; border-radius:999px;
    background:rgba(255,255,255,.92); border:none; color:#2a2d38;
    font-size:12px; font-weight:700; letter-spacing:-.01em; margin-bottom:18px; }
  .welcome__title{ font-size:26px; font-weight:800; color:#fff; letter-spacing:-.02em; line-height:1.3; }
  .welcome__desc{ margin-top:14px; font-size:15px; line-height:1.65; color:rgba(255,255,255,.7); }
  .welcome__desc b{ color:#fff; font-weight:700; }
  .welcome__preview{ margin-top:24px; border-radius:12px; overflow:hidden; background:#fff; border:1px solid rgba(255,255,255,.14); box-shadow:0 14px 34px rgba(0,0,0,.34); }
  .welcome__preview img{ display:block; width:100%; height:auto; }
  .welcome__btns{ margin-top:22px; display:flex; flex-direction:column; gap:6px; }
  .welcome__btn{ font-family:inherit; cursor:pointer; border:none; border-radius:14px; font-weight:700; transition:transform .1s, background .16s, color .16s; }
  .welcome__btn--primary{ position:relative; display:flex; align-items:center; justify-content:center; gap:9px;
    background:#fff; color:#2a2d38; font-size:16px; padding:17px; box-shadow:0 10px 26px rgba(0,0,0,.3); }
  .welcome__btn--primary:hover{ background:#f2f0eb; } .welcome__btn--primary:active{ transform:translateY(1px); }
  .welcome__btn--primary .arw{ transition:transform .18s; } .welcome__btn--primary:hover .arw{ transform:translateX(3px); }
  .welcome__rec{ background:#FFC53D; color:#3a2a00; font-size:12px; font-weight:800; padding:4px 10px; border-radius:999px; }
  .welcome__btn--ghost{ background:transparent; color:rgba(255,255,255,.55); font-size:14px; padding:12px; }
  .welcome__btn--ghost:hover{ color:rgba(255,255,255,.9); }
  .wgrid__note{ margin-bottom:14px; font-size:12.5px; font-weight:600; color:#6D58F2; background:#F4F4FE; border:1px solid #E4E6FF; border-radius:10px; padding:9px 12px; }
  /* 체험용 안내 배지 — 브라우저 하단 고정, 작지만 눈에 띄게 */
  .demo-note{ position:relative; z-index:5; align-self:center; display:inline-flex; align-items:center; gap:8px; padding:10px 18px; border-radius:999px;
    background:rgba(26,20,10,.94); color:#fff; font-size:18px; font-weight:700; letter-spacing:-.1px;
    box-shadow:0 6px 22px rgba(42,36,24,.22); pointer-events:none; }
  .demo-note i{ display:inline-block; width:7px; height:7px; border-radius:50%; background:#FFC53D;
    box-shadow:0 0 0 0 rgba(255,197,61,.6); animation:demoPulse 1.8s ease-out infinite; }
  @keyframes demoPulse{ 0%{box-shadow:0 0 0 0 rgba(255,197,61,.55);} 70%{box-shadow:0 0 0 7px rgba(255,197,61,0);} 100%{box-shadow:0 0 0 0 rgba(255,197,61,0);} }
  button{ font-family:inherit; cursor:pointer; border:none; background:none; color:inherit; }
  input,select,textarea{ font-family:inherit; }
  ::-webkit-scrollbar{ width:10px; height:10px; }
  ::-webkit-scrollbar-thumb{ background:#cfd4d9; border-radius:8px; border:2px solid transparent; background-clip:content-box; }

  /* ===== 빌더 전체를 창 크기에 맞춰 비율 그대로 축소/확대 =====
     로직 레이아웃은 항상 1440 폭. 창이 작으면 뼈대 전체가 작아져 다 보이고,
     크면 커진다. 좌상단 기준 스케일 → 우측·하단 빈 공간 0. */
  /* width:100vw/height:100vh = JS 스케일이 늦거나 안 돌아도 일단 뷰포트를 꽉 채우는 폴백.
     JS가 돌면 (vw/s)px + scale(s) 로 덮어써 비율 축소/확대. 어느 경우든 백지 없음. */
  #stage{ position:absolute; top:0; left:0; width:1440px; height:900px; transform-origin:top left; }
  .shell{ display:flex; width:100%; height:100%; background:var(--white); overflow:hidden; }

  /* ===================== APP BAR ===================== */
  .appbar{ width:68px; flex:0 0 68px; background:var(--appbar-bg); display:flex; flex-direction:column; justify-content:space-between; padding:20px 0; }
  .appbar__products{ display:flex; flex-direction:column; }
  .prod{ position:relative; width:62px; height:104px; margin-left:6px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:7px; border-radius:8px 0 0 8px; background:transparent; transition:background .15s; }
  .prod:not(.is-active){ opacity:.8; }
  .prod:not(.is-active):hover{ opacity:1; background:rgba(255,255,255,.45); }
  .prod.is-active{ background:var(--white); }
  .prod__badge{ position:absolute; top:14px; font-size:9px; font-weight:600; line-height:1; color:var(--ink-sub); background:rgba(255,255,255,.7); border:1px solid var(--line); padding:2px 5px; border-radius:6px; white-space:nowrap; }
  .prod.is-active .prod__badge{ color:#24D1A0; border-color:#bdeede; background:#eafaf4; }
  .prod__icon{ width:32px; height:32px; display:flex; }
  .prod__icon svg{ width:32px; height:32px; }
  .prod__name{ font-size:11px; font-weight:500; color:var(--ink-sub); }
  .prod.is-active .prod__name{ color:var(--ink); font-weight:600; }
  .appbar__settings{ display:flex; flex-direction:column; align-items:center; gap:22px; padding-bottom:6px; }
  .appbar__settings .sicon{ width:24px; height:24px; color:var(--ink-faint); cursor:pointer; }
  .appbar__settings .sicon:hover{ color:var(--ink-sub); }
  .appbar__settings .sicon svg{ width:24px; height:24px; }

  /* ===================== MAIN ===================== */
  .main{ flex:1; display:flex; flex-direction:column; min-width:0; }

  /* ----- GNB ----- */
  .gnb{ height:52px; flex:0 0 52px; background:var(--gnb-bg); border-bottom:1px solid var(--line); display:flex; align-items:center; padding:0 16px; gap:8px; position:relative; z-index:30; }
  .gnb__spacer{ flex:1; }
  .gnb__group{ display:flex; align-items:center; gap:8px; }
  .gnb__side{ flex:1; display:flex; align-items:center; gap:8px; min-width:0; }
  .gnb__side--right{ justify-content:flex-end; }
  .gnb__center{ display:flex; align-items:center; gap:8px; }
  .seg{ display:flex; background:var(--white); border:1px solid var(--line); border-radius:8px; padding:2px; gap:2px; }
  .seg button{ width:28px; height:28px; border-radius:6px; display:flex; align-items:center; justify-content:center; color:var(--ink-sub); }
  .seg button svg{ width:16px; height:16px; }
  .seg button.is-active{ background:var(--ink); color:#fff; }
  .pill{ height:32px; display:inline-flex; align-items:center; gap:6px; padding:0 12px; border-radius:6px; background:var(--white); border:1px solid var(--line); font-size:13px; font-weight:500; color:var(--ink); position:relative; }
  .pill:hover{ border-color:#d4d8dc; }
  .pill svg{ width:16px; height:16px; color:var(--ink-sub); }
  .pill .chev{ width:14px; height:14px; }
  .ico{ width:28px; height:28px; border-radius:10px; display:flex; align-items:center; justify-content:center; color:var(--ink-sub); }
  .ico:hover:not([disabled]){ background:rgba(46,46,49,.06); }
  .ico svg{ width:16px; height:16px; }
  .ico[disabled]{ opacity:.35; cursor:default; }
  .ico.lg svg{ width:20px; height:20px; }
  .gnb__status{ font-size:12px; color:#16a34a; font-weight:500; display:inline-flex; align-items:center; gap:5px; margin:0 4px; }
  .gnb__status::before{ content:""; width:6px; height:6px; border-radius:50%; background:#22c55e; }
  .btn-dark{ height:32px; padding:0 14px; border-radius:10px; background:var(--ink); color:#fff; font-size:13px; font-weight:600; min-width:64px; }
  .btn-dark:hover{ background:#1c1c1f; }
  .btn-soft{ height:32px; padding:0 14px; border-radius:10px; background:var(--soft-bg); border:1px solid var(--line); color:var(--ink); font-size:13px; font-weight:500; min-width:64px; }
  .btn-soft:hover{ background:#eef0f2; }

  /* ----- workspace ----- */
  .workspace{ flex:1; display:flex; min-height:0; position:relative; }
  .canvas{ flex:1; display:flex; flex-direction:column; min-width:0; background:var(--canvas-bg); }
  .urlbar{ height:56px; flex:0 0 56px; display:flex; align-items:center; gap:8px; padding:0 16px; }
  .urlbar .nav{ display:flex; gap:2px; }
  .urlpill{ flex:1; max-width:680px; height:34px; display:flex; align-items:center; gap:8px; background:var(--white); border:1px solid var(--line); border-radius:18px; padding:0 12px; font-size:12px; color:var(--ink-mute); }
  .urlpill .globe{ width:14px; height:14px; color:#9aa0a6; flex:0 0 14px; }
  .urlpill .u{ flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .urlpill .refresh{ width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--ink-sub); }
  .urlpill .refresh:hover{ background:#f0f1f3; }
  .urlpill .refresh svg{ width:14px; height:14px; }

  .preview{ flex:1; padding:0 16px 16px; min-height:0; display:flex; justify-content:center; }
  .preview__frame{ flex:1; max-width:100%; background:#fff; border:1px solid var(--line); border-radius:10px 10px 0 0; overflow:hidden; box-shadow:0 1px 3px rgba(16,24,40,.05); position:relative; transition:max-width .25s ease; }
  .preview__frame.mobile{ max-width:402px; border-radius:18px 18px 0 0; box-shadow:0 6px 30px rgba(16,24,40,.14); }
  .preview__scroll{ height:100%; overflow:hidden; }
  .preview__img{ display:block; width:100%; }
  .preview__frame.mobile .preview__img{ width:100%; }

  /* canvas selectable hotspots */
  .hotspots{ position:absolute; inset:0; }
  .hot{ position:absolute; left:0; right:0; cursor:pointer; outline:2px solid transparent; outline-offset:-2px; transition:background .1s; }
  .hot:hover{ background:rgba(131,122,255,.08); outline-color:rgba(131,122,255,.5); }
  .hot::after{ content:attr(data-name); position:absolute; top:6px; left:8px; font-size:11px; font-weight:600; color:#fff; background:var(--accent); padding:2px 8px; border-radius:6px; opacity:0; transform:translateY(-2px); transition:opacity .12s; pointer-events:none; white-space:nowrap; }
  .hot:hover::after{ opacity:1; }
  .hot.is-selected{ outline:2px solid var(--accent); background:rgba(131,122,255,.04); }
  .hot.is-selected::after{ opacity:1; }
  /* floating widget action toolbar */
  .wtools{ position:absolute; right:10px; top:10px; display:none; flex-direction:column; gap:6px; z-index:5; }
  .hot.is-selected .wtools{ display:flex; }
  .wtools button{ width:32px; height:32px; border-radius:50%; background:#fff; box-shadow:0 2px 8px rgba(16,24,40,.18); display:flex; align-items:center; justify-content:center; color:var(--ink-sub); }
  .wtools button:hover{ color:var(--accent); }
  .wtools button.del:hover{ color:#ef4444; }
  .wtools svg{ width:16px; height:16px; }

  /* ----- toolbar ----- */
  .toolbar{ width:63px; flex:0 0 63px; display:flex; flex-direction:column; align-items:center; padding:10px 0; gap:6px; background:transparent; }
  .toolbar__label{ font-size:11px; color:var(--ink-faint); margin-bottom:4px; }
  .tbtn{ width:48px; height:50px; border-radius:10px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:5px; color:var(--ink-sub); font-size:11px; font-weight:500; }
  .tbtn svg{ width:20px; height:20px; }
  .tbtn:hover{ background:rgba(46,46,49,.05); color:var(--ink); }
  .tbtn.is-active{ background:var(--accent-bg); color:var(--accent); }
  .toolbar hr{ width:28px; height:1px; border:none; background:var(--line); margin:2px 0; }

  /* ===================== PROPERTY PANEL ===================== */
  .panel{ width:0; flex:0 0 0; background:#fff; border-left:1px solid var(--line); display:flex; flex-direction:column; overflow:hidden; transition:flex-basis .22s ease, width .22s ease; }
  .panel.open{ width:320px; flex-basis:320px; }
  .panel__head{ height:52px; flex:0 0 52px; display:flex; align-items:center; justify-content:space-between; padding:0 16px; border-bottom:1px solid var(--line-soft); }
  .panel__title{ font-size:15px; font-weight:700; }
  .panel__close{ width:28px; height:28px; border-radius:8px; display:flex; align-items:center; justify-content:center; color:var(--ink-sub); }
  .panel__close:hover{ background:#f2f3f5; }
  .panel__body{ flex:1; overflow-y:auto; padding:16px; }
  .panel__foot{ flex:0 0 auto; display:flex; gap:8px; padding:12px 16px; border-top:1px solid var(--line-soft); }
  .panel__foot .grow{ flex:1; }

  /* preset thumbnails */
  .presets{ display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:18px; }
  .preset{ border:1.5px solid var(--line); border-radius:10px; padding:8px 6px; display:flex; flex-direction:column; align-items:center; gap:7px; font-size:11px; color:var(--ink-sub); background:#fff; }
  .preset:hover{ border-color:#cfd2d8; }
  .preset.is-active{ border-color:var(--accent); color:var(--accent); background:var(--accent-bg); }
  .preset .ph{ width:100%; height:30px; border-radius:5px; background:#eef0f2; display:flex; align-items:center; justify-content:center; gap:3px; }
  .preset .ph i{ display:block; background:#cfd3da; border-radius:2px; }

  /* accordion section */
  .acc{ border-top:1px solid var(--line-soft); }
  .acc:first-of-type{ border-top:none; }
  .acc__head{ width:100%; display:flex; align-items:center; justify-content:space-between; padding:14px 2px; font-size:13.5px; font-weight:600; color:var(--ink); }
  .acc__head .chev{ width:16px; height:16px; color:var(--ink-faint); transition:transform .18s; }
  .acc.open .acc__head .chev{ transform:rotate(180deg); }
  .acc__body{ display:none; padding:0 2px 16px; }
  .acc.open .acc__body{ display:block; }
  .req{ color:var(--accent); margin-left:2px; }

  /* generic field */
  .fld{ margin-bottom:14px; }
  .fld:last-child{ margin-bottom:0; }

  .railhud{ position:fixed; left:50%; top:14px; transform:translateX(-50%); z-index:9993; display:flex; align-items:center; gap:6px; background:#15171d; color:#fff; padding:7px 10px; border-radius:999px; box-shadow:0 10px 30px rgba(0,0,0,.28); font-size:12.5px; font-weight:700; }
  .railhud__c{ display:flex; align-items:center; gap:6px; padding:4px 10px; border-radius:999px; color:#8b93a7; transition:color .18s, background .18s; }
  .railhud__c .n{ width:16px; height:16px; border-radius:999px; border:1.5px solid #4a5162; display:inline-flex; align-items:center; justify-content:center; font-size:10px; }
  .railhud__c.on{ color:#fff; background:rgba(255,255,255,.10); }
  .railhud__c.on .n{ border-color:#fff; }
  .railhud__c.done{ color:#8b93a7; }
  .railhud__c.done .n{ background:#37d39b; border-color:#37d39b; color:#0d2e22; }
  .railhud__sep{ width:12px; height:1.5px; background:#3a4152; border-radius:2px; }
  /* 온보딩: 카드는 모두 정상으로 보이되(누를 수 있는 듯) 실제 추가는 타깃(콘텐츠+상품 그리드)만 — 나머지를 누르면 타깃으로 유도 */
  .wgrid--rail .wcard{ animation:railDimIn .4s ease; }
  @keyframes railDimIn{ 0%{ opacity:0; transform:translateY(10px);} 100%{ opacity:1; transform:none;} }
  .wgrid--rail .wcard.wcard--target{ position:relative; overflow:visible; border-color:#6D58F2; border-width:1.5px; background:#F7F6FF; box-shadow:0 0 0 3px rgba(109,88,242,.20); animation:railTargetIn .55s cubic-bezier(.34,1.56,.64,1), railpulse 1.6s ease-in-out .55s infinite; }
  @keyframes railTargetIn{ 0%{ opacity:0; transform:scale(.9);} 60%{ opacity:1;} 100%{ opacity:1; transform:scale(1);} }
  @keyframes railpulse{ 0%,100%{ box-shadow:0 0 0 3px rgba(109,88,242,.16);} 50%{ box-shadow:0 0 0 7px rgba(109,88,242,.30);} }
  .wgrid--rail .wcard.wcard--target.nudge{ animation:railNudge .55s ease; }
  @keyframes railNudge{ 0%,100%{ transform:none;} 25%{ transform:scale(1.05);} 50%{ transform:scale(.98);} 75%{ transform:scale(1.03);} }
  .wcard__pick{ display:none; }
  .wgrid--rail .wcard--target .wcard__pick{ display:inline-block; margin-left:auto; font-size:11px; font-weight:800; color:#6D58F2; }
  /* 둥둥 떠다니는 안내 말풍선 (딤 없이 부드럽게) */
  @keyframes coachFloat{ 0%,100%{ transform:translateY(0);} 50%{ transform:translateY(-7px);} }
  .coach:not([data-final]){ animation:coachFloat 1.4s ease-in-out infinite; }

(function(){
  var BASE_W = 1440;          // 로직 폭 고정 (이 기준으로 윈도우 안에서 스케일)
  var stage = document.getElementById('stage');
  function fit(){
    var win = document.getElementById('scWindow');
    if(!win) return;
    var s = win.clientWidth / BASE_W;     // 플로팅 윈도우 폭 기준
    stage.style.transform = 'scale(' + s + ')';
  }
  window.addEventListener('resize', fit);
  window.addEventListener('orientationchange', fit);
  window.addEventListener('load', fit);
  fit(); setTimeout(fit, 80); setTimeout(fit, 350);
  window.__fit = fit;
  requestAnimationFrame(fit);
})();

    + '<button class="hsub__add" data-hdr-sadd="'+i+'">'+HIC.plus+' 하위분류 추가</button></div>' : '';
  var divider=(i===cap-1 && n>cap) ? '<div class="menu-divider">여기부터는 헤더에 직접 노출되지 않고 <b>☰ 전체</b> 메뉴에서 보여져요</div>' : '';
  return '<div class="hmenu'+(open?' is-open':'')+(over?' hmenu--over':'')+'">'+row+body+'</div>'+divider; }).join(''); }
function hdrCF(label, attr, val, note){ return field(label, (note?'<div class="help" style="margin:-2px 0 8px">'+note+'</div>':'')

/* 헤더 설정 이벤트 (레이아웃·메뉴 CRUD·호버·스타일·스크롤) */
function hdrSync(){ renderCanvas(); renderPanel(headerPanel()); }
document.addEventListener('click', function(e){
  var t, H=PAGE.header;
  if((t=e.target.closest('[data-hdr-layout]'))){ H.layout=t.dataset.hdrLayout; hdrSync(); return; }
  if((t=e.target.closest('[data-hdr-mtoggle]'))){ var mt=+t.dataset.hdrMtoggle; H.menu[mt]._open=!H.menu[mt]._open; renderPanel(headerPanel()); return; }
  if((t=e.target.closest('[data-hdr-madd]'))){ H.menu.push({name:'새 메뉴',subs:[]}); hdrSync(); return; }
  if((t=e.target.closest('[data-hdr-sadd]'))){ var si=+t.dataset.hdrSadd; (H.menu[si].subs=H.menu[si].subs||[]).push('새 하위분류'); H.menu[si]._open=true; hdrSync(); return; }
  if((t=e.target.closest('[data-hdr-sdel]'))){ var pr=t.dataset.hdrSdel.split('_'); H.menu[+pr[0]].subs.splice(+pr[1],1); hdrSync(); return; }
  if((t=e.target.closest('[data-hdr-mdel]'))){ if(H.menu.length>1){ var i=+t.dataset.hdrMdel; H.menu.splice(i,1); if(H.active>=H.menu.length) H.active=H.menu.length-1; hdrSync(); } else toast('최소 1개 메뉴가 필요해요'); return; }
  if((t=e.target.closest('[data-hdr-mup]'))){ var i2=+t.dataset.hdrMup; if(i2>0){ var a=H.menu; var x=a[i2];a[i2]=a[i2-1];a[i2-1]=x; hdrSync(); } return; }
  if((t=e.target.closest('[data-hdr-mdown]'))){ var i3=+t.dataset.hdrMdown; if(i3<H.menu.length-1){ var b=H.menu; var y=b[i3];b[i3]=b[i3+1];b[i3+1]=y; hdrSync(); } return; }
  if((t=e.target.closest('[data-hdr-hoversub]'))){ H.hoverSub=!H.hoverSub; hdrSync(); return; }
  if((t=e.target.closest('[data-hdr-transparent]'))){ H.transparent=!H.transparent; hdrSync(); return; }
  if((t=e.target.closest('[data-hdr-scroll] button'))){ H.scrollMode=t.dataset.val; hdrSync(); return; }
});
document.addEventListener('input', function(e){
  var el=e.target; if(!el||!el.dataset) return; var H=PAGE.header;

/* 메뉴 드래그로 위치 이동 → 즉시 헤더 반영 */
(function(){ var dragI=null;

/* 9분할 위치 → [justify(세로), align(가로)] */
var POS9 = ['flex-start flex-start','flex-start center','flex-start flex-end','center flex-start','center center','center flex-end','flex-end flex-start','flex-end center','flex-end flex-end'];
/* ---- 프로모션 배너 미리보기 렌더 ---- */
function promoCell(it, i, ar, s){
  var p = POS9[s.textPos].split(' '), t='';
  if(it.sub.show)   t += '<div class="lwp__sub">'+esc(it.sub.text)+'</div>';
  if(it.title.show) t += '<div class="lwp__title">'+esc(it.title.text)+'</div>';
  if(it.desc.show)  t += '<div class="lwp__desc">'+esc(it.desc.text)+'</div>';
  return '<div class="lwp__cell'+(i===s.sel?' sel':'')+'" data-live-pick="'+i+'" style="background-image:'+LIVE_G[it.g%5]+';aspect-ratio:'+ar+';border-radius:'+s.radius+'px">'
    + '<div class="lwp__txt" style="justify-content:'+p[0]+';align-items:'+p[1]+';gap:'+s.textGap+'px">'+t+'</div></div>';
}
function renderPromoLive(){
  var s = liveState.promo, mobile = $('#frame').classList.contains('mobile');
  var ar = mobile ? (s.ratioMoV || PROMO_RATIOS[s.ratio].v) : PROMO_RATIOS[s.ratio].v;
  var fullCls = s.width==='full' ? ' is-full' : '';
  // 한 페이지에 보이는 수 = 단 수(모바일은 1). 항목이 많으면 행 추가가 아니라 페이지 스와이프로 넘김
  var pageSize = mobile ? 1 : s.cols;
  var pages = Math.ceil(s.items.length / pageSize) || 1;
  var page = Math.min(pages-1, Math.floor(s.sel / pageSize));
  var start = page * pageSize;
  var cells = s.items.slice(start, start+pageSize).map(function(it,j){ return promoCell(it, start+j, ar, s); }).join('');
  var multi = pages > 1;
  var nav = multi ? '<button class="lwp__arrow prev" data-promo-nav="-1">‹</button><button class="lwp__arrow next" data-promo-nav="1">›</button>' : '';
  var dots = '';
  if(multi){ var dd=''; for(var p=0;p<pages;p++){ dd += '<i class="'+(p===page?'on':'')+'" data-live-pick="'+(p*pageSize)+'"></i>'; } dots = '<div class="lwp__dots">'+dd+'</div>'; }
  var hint = multi ? '<div class="lwp__swipe">← 스와이프하여 다음 페이지 보기 ('+(page+1)+' / '+pages+')</div>' : '';

    + '<div class="lwp__grid" style="grid-template-columns:repeat('+pageSize+',1fr);gap:'+s.contentGap+'px">'+cells+'</div>'+nav+'</div>'+dots+hint+'</div></div>';
}

function gridCell(it, i, s, p){
  var t='';
  if(it.title.show) t += '<div class="lwg__title">'+esc(it.title.text)+'</div>';
  if(it.desc.show)  t += '<div class="lwg__desc">'+esc(it.desc.text)+'</div>';
  return '<div class="lwg__cell'+(i===s.sel?' sel':'')+'" data-live-pick="'+i+'" style="background-image:'+LIVE_G[it.g%5]+';aspect-ratio:'+RATIOS[s.ratio]+';border-radius:'+s.radius+'px">'
    + '<div class="lwg__txt" style="justify-content:'+p[0]+';align-items:'+p[1]+';text-align:center;color:'+it.color+'">'+t+'</div></div>';
}
function gridHeadHtml(s){
  var h = s.head; if(!h) return '';
  var hh = '';
  if(h.title.show)    hh += '<div class="lwg__h-title">'+esc(h.title.text)+'</div>';
  if(h.subtitle.show) hh += '<div class="lwg__h-sub">'+esc(h.subtitle.text)+'</div>';
  return hh ? '<div class="lwg__head" style="text-align:'+h.align+'">'+hh+'</div>' : '';

function renderGridLive(){
  var s = liveState.grid, mobile = $('#frame').classList.contains('mobile');
  var p = POS9[s.textPos].split(' ');
  var fullCls = s.width==='full' ? ' is-full' : '';
  var head = gridHeadHtml(s);
  if(mobile){
    // 모바일: 자체 열×행 그리드. 항목이 한 페이지보다 많으면 스와이프 페이지네이션
    var pageSize = Math.max(1, s.colsMo * s.rowsMo);
    var pages = Math.ceil(s.items.length / pageSize) || 1;
    if(s.moPage > pages-1) s.moPage = pages-1;
    if(s.moPage < 0) s.moPage = 0;
    var startM = s.moPage * pageSize;
    var mcells = s.items.slice(startM, startM+pageSize).map(function(it,j){ return gridCell(it, startM+j, s, p); }).join('');
    var multi = pages > 1;
    var nav = multi ? '<button class="lwp__arrow prev" data-grid-nav="-1">‹</button><button class="lwp__arrow next" data-grid-nav="1">›</button>' : '';
    var dots = '';
    if(multi){ var dd=''; for(var pg=0;pg<pages;pg++){ dd += '<i class="'+(pg===s.moPage?'on':'')+'" data-grid-page="'+pg+'"></i>'; } dots='<div class="lwp__dots">'+dd+'</div>'; }
    var hint = multi ? '<div class="lwp__swipe">← 스와이프하여 다음 페이지 보기 ('+(s.moPage+1)+' / '+pages+')</div>' : '';
    return '<div class="lwg'+fullCls+'"><div class="lwg__inner">'+head+'<div class="lwp__carousel">'
      + '<div class="lwg__grid" style="grid-template-columns:repeat('+s.colsMo+',1fr);gap:'+s.contentGap+'px">'+mcells+'</div>'+nav+'</div>'+dots+hint+'</div></div>';
  }
  // PC: 한 페이지 = 열×행. 항목이 넘치면 페이지 스와이프
  var pcSize = Math.max(1, s.cols * s.rows);
  var pcPages = Math.ceil(s.items.length / pcSize) || 1;
  if(s.pcPage > pcPages-1) s.pcPage = pcPages-1;
  if(s.pcPage < 0) s.pcPage = 0;
  var startP = s.pcPage * pcSize;
  var cells = s.items.slice(startP, startP+pcSize).map(function(it,j){ return gridCell(it, startP+j, s, p); }).join('');
  var pmulti = pcPages > 1;
  var pnav = pmulti ? '<button class="lwp__arrow prev" data-grid-pcnav="-1">‹</button><button class="lwp__arrow next" data-grid-pcnav="1">›</button>' : '';
  var pdots = '';
  if(pmulti){ var pd=''; for(var pp=0;pp<pcPages;pp++){ pd += '<i class="'+(pp===s.pcPage?'on':'')+'" data-grid-pcpage="'+pp+'"></i>'; } pdots='<div class="lwp__dots">'+pd+'</div>'; }
  var phint = pmulti ? '<div class="lwp__swipe">← 스와이프하여 다음 페이지 보기 ('+(s.pcPage+1)+' / '+pcPages+')</div>' : '';
  return '<div class="lwg'+fullCls+'"><div class="lwg__inner">'+head+'<div class="lwp__carousel">'
    + '<div class="lwg__grid" style="grid-template-columns:repeat('+s.cols+',1fr);gap:'+s.contentGap+'px">'+cells+'</div>'+pnav+'</div>'+pdots+phint+'</div></div>';
}

  panelBody.innerHTML = (def.note?'<div class="help" style="margin:-4px 0 12px">'+def.note+'</div>':'') + def.body;
  panelFoot.innerHTML = def.foot || '';

function openTool(tool){
  // toolbar active state
  $$('.tbtn').forEach(function(b){ b.classList.toggle('is-active', b.dataset.tool===tool && tool!=='widget'); });

  clearLive();

function ensureLiveHost(){
  var scroll = $('.preview__scroll');
  scroll.style.overflowY = 'auto';

  if(!host){
    host = document.createElement('div');
    host.id = 'liveWidget'; host.className = 'livewrap is-selected';
    host.innerHTML = '<span class="lw-tag"></span><div class="lw-body"></div>';
    scroll.insertBefore(host, scroll.firstChild);

function clearLive(){
  if(!activeLive) return;

function bindMenu(btnId, menuId){
  var btn = $('#'+btnId), menu = $('#'+menuId);
  btn.addEventListener('click', function(e){
    e.stopPropagation();
    var open = menu.classList.contains('open');
    $$('.menu').forEach(function(m){ m.classList.remove('open'); });
    if(open){ return; }
    menu.classList.add('open');   // 먼저 표시해야 offsetParent 측정 가능
    // 스케일 보정 + offsetParent 기준 정렬: 버튼 바로 아래 8px에 붙임
    var stage=document.getElementById('stage');
    var sc = stage.getBoundingClientRect().width / stage.offsetWidth;
    var r = btn.getBoundingClientRect();
    var op = menu.offsetParent || document.body, pr = op.getBoundingClientRect();
    menu.style.left = ((r.left - pr.left)/sc) + 'px';
    menu.style.top  = ((r.bottom - pr.top)/sc + 8) + 'px';
  });
  menu.addEventListener('click', function(e){ var b=e.target.closest('button'); if(b){ menu.classList.remove('open'); } });
}

function tourClear(){ ['spot','tip','backdrop','center'].forEach(function(k){ if(tour[k]){ tour[k].parentNode && tour[k].parentNode.removeChild(tour[k]); tour[k]=null; } }); tour._cur=null; }
function startTour(){ tour.i=0; tour.active=true; try{localStorage.setItem('ac_intro_seen','1');}catch(e){} showStep(0); }
function endTour(){ tour.active=false; tourClear(); if(panel.classList.contains('open')) closePanel(); closeModal(); }
function tourNext(){ if(tour.i < TOUR_STEPS.length-1){ showStep(++tour.i); } else { endTour(); } }
function tourPrev(){ if(tour.i>0){ showStep(--tour.i); } }
function tourDots(active){ var s=''; for(var k=0;k<TOUR_STEPS.length;k++){ s+='<i class="'+(k===active?'on':'')+'"></i>'; } return s; }

function showStep(i){
  tourClear();
  var st = TOUR_STEPS[i];
  if(st.before){ try{ st.before(); }catch(e){} }
  if(st.type==='center'){ showCenter(st); return; }
  setTimeout(function(){ if(tour.active) showSpot(st); }, 360);
}
function showCenter(st){
  var b=document.createElement('div'); b.className='tour-backdrop'; document.body.appendChild(b); tour.backdrop=b;
  var c=document.createElement('div'); c.className='tour-center';
  c.innerHTML='<div class="tour-center__badge">'+(st.icon||'✨')+'</div>'
    +'<div class="tour-center__title">'+st.title+'</div>'
    +'<div class="tour-center__body">'+st.body+'</div>'
    +'<div class="tour-center__nav">'
    +'<button class="tour-btn tour-btn--primary" data-act="'+(st.final?'cta':'next')+'">'+st.primary+'</button>'
    +'<button class="tour-btn tour-btn--ghost" data-act="end">'+st.secondary+'</button></div>';
  document.body.appendChild(c); tour.center=c;
  c.addEventListener('click', function(e){ var a=e.target.closest('[data-act]'); if(!a)return; var act=a.dataset.act;
    if(act==='next') tourNext(); else if(act==='end') endTour();
    else if(act==='cta'){ endTour(); toast('🎉 실제 서비스에서는 가입/시작 플로우로 연결돼요'); } });
}
function showSpot(st){
  var el = typeof st.target==='function' ? st.target() : $(st.target);
  if(!el){ tourNext(); return; }
  tour.spot=document.createElement('div'); tour.spot.className='tour-spot'; document.body.appendChild(tour.spot);
  var tip=document.createElement('div'); tip.className='tour-tip';
  var lastSpot = tour.i===TOUR_STEPS.length-2;
  tip.innerHTML='<div class="tour-tip__step">'+(st.step||'')+'</div>'
    +'<div class="tour-tip__title">'+st.title+'</div>'
    +'<div class="tour-tip__body">'+st.body+'</div>'
    +'<div class="tour-tip__nav"><div class="tour-tip__dots">'+tourDots(tour.i)+'</div><span class="sp"></span>'
    +'<button class="tour-btn tour-btn--ghost" data-act="end">그만보기</button>'
    +'<button class="tour-btn tour-btn--primary" data-act="next">'+(lastSpot?'마지막이에요':'다음')+'</button></div>';
  document.body.appendChild(tip); tour.tip=tip;
  tip.addEventListener('click', function(e){ var a=e.target.closest('[data-act]'); if(!a)return;
    if(a.dataset.act==='next') tourNext(); else if(a.dataset.act==='end') endTour(); });
  tour._cur={ el:el, place:st.place };
  positionSpot(el, st.place);
  setTimeout(function(){ if(tour.active&&tour._cur) positionSpot(tour._cur.el, tour._cur.place); }, 260);
}
function positionSpot(el, place){
  if(!tour.spot||!tour.tip) return;
  var r=el.getBoundingClientRect(), pad=8;
  var x=r.left-pad, y=r.top-pad, w=r.width+pad*2, h=r.height+pad*2;
  tour.spot.style.left=x+'px'; tour.spot.style.top=y+'px'; tour.spot.style.width=w+'px'; tour.spot.style.height=h+'px';
  var tw=tour.tip.offsetWidth, th=tour.tip.offsetHeight, gap=16, vw=window.innerWidth, vh=window.innerHeight;
  function at(p){ if(p==='left')return [x-gap-tw,y]; if(p==='right')return [x+w+gap,y]; if(p==='top')return [x,y-gap-th]; return [x,y+h+gap]; }
  var fp=place, pos=at(fp);
  if(fp==='left' && pos[0]<12) fp='right';
  else if(fp==='right' && pos[0]+tw>vw-12) fp='left';
  else if(fp==='top' && pos[1]<12) fp='bottom';
  else if(fp==='bottom' && pos[1]+th>vh-12) fp='top';
  pos=at(fp);
  var tx=Math.max(12, Math.min(pos[0], vw-12-tw));
  var ty=Math.max(12, Math.min(pos[1], vh-12-th));
  tour.tip.style.left=tx+'px'; tour.tip.style.top=ty+'px';
  tour.tip.className='tour-tip tip-'+fp;
}
window.addEventListener('resize', function(){ if(tour.active&&tour._cur&&tour.tip) positionSpot(tour._cur.el, tour._cur.place); });

    ? '<select class="dp-selbox" data-dsizesel style="color:'+(o.sizeSel<0?'#8d97a5':'#2a3040')+'"><option value="-1"'+(o.sizeSel<0?' selected':'')+' disabled hidden>사이즈를 선택해 주세요</option>'+o.sizes.map(function(x,i){ return '<option value="'+i+'"'+(o.sizeSel===i?' selected':'')+'>'+esc(x||('항목 '+(i+1)))+'</option>'; }).join('')+'</select>'
    : '<div class="dp-sizes">'+o.sizes.map(function(x,i){ return '<button class="dp-size" data-dsize="'+i+'">'+esc(x)+'</button>'; }).join('')+'</div>';
}
/* 색상/텍스트/이미지 공용 캔버스 렌더 (items: [{c,name,img}]) */
function dpGroupCanvas(mode, items, sel){
  if(mode==='image') return '<div class="dp-pats">'+items.map(function(it,i){ return '<div class="dp-pat'+(sel===i?' sel':'')+'" data-dgi="'+i+'"><div class="dp-pat__img" style="'+(it.img?'background:'+dpImg(it.img):'')+'"></div><div class="dp-pat__nm">'+esc(it.name||('옵션 '+(i+1)))+'</div></div>'; }).join('')+'</div>';
  if(mode==='text')  return '<div class="dp-sizes">'+items.map(function(it,i){ return '<button class="dp-size'+(sel===i?' sel':'')+'" data-dgi="'+i+'">'+esc(it.name||('옵션 '+(i+1)))+'</button>'; }).join('')+'</div>';
  return '<div class="dp-sws">'+items.map(function(it,i){ return '<span class="dp-sw'+(sel===i?' sel':'')+'" data-dgi="'+i+'" style="background:'+(it.c||'#e3e7ec')+'" title="'+escAttr(it.name||'')+'"></span>'; }).join('')+'</div>';
}
function bundleRowC(b,i,sel){
  return '<label class="dp-bopt'+(sel===i?' sel':'')+'" data-dbundle="'+i+'">'
    +'<span class="dp-radio"></span>'
    +'<span class="dp-bmid"><span class="dp-bnm">'+esc(b.name||('구성 '+(i+1)))+dpBadge(b.badge)+'</span>'
    +(b.sub?'<span class="dp-bsub">'+esc(b.sub)+'</span>':'')+'</span>'
    +'<span class="dp-bpr">'+esc(b.price||'')+'</span></label>';
}
function renderDetailOption(){
  var o=DETAIL.opt, inner;
  if(o.group==='bundle'){
    inner='<div class="dp-optlab">구성 선택</div><div class="dp-bundle">'+o.bundle.map(function(b,i){ return bundleRowC(b,i,o.sel); }).join('')+'</div>';
  } else if(o.group==='design'){
    inner='<div class="dp-optlab">색상 <span class="dp-req">[필수]</span> <span class="dp-reqhint">옵션을 선택해 주세요</span></div>'+dpGroupCanvas(o.patternMode, o.pattern, o.sel);
  } else if(o.group==='etc'){
    inner='<div class="dp-optlab">색상</div>'+dpGroupCanvas(o.etcMode||'color', o.colors, o.sel)+'<div class="dp-optlab">사이즈</div>'+dpSizeCanvas(o);
  } else {
    inner='<div class="dp-optlab">색상</div>'+dpGroupCanvas('color', o.colors, o.sel)+'<div class="dp-optlab">사이즈</div>'+dpSizeCanvas(o);
  }
  return '<div class="dp-opt" id="dpOpt" data-detailopt>'+inner+'</div>';
}
function dpUpdateTotal(){
  var o=DETAIL.opt, amtEl=document.querySelector('#sfcanvas .dp-total .amt'); if(!amtEl) return;
  var picked=(o.sel>=0)||(o.sizeSel>=0), price=DETAIL.product.price;
  if(o.group==='bundle' && o.sel>=0) price=o.bundle[o.sel].price;
  amtEl.innerHTML=(picked?esc(price):'0')+' <span style="font-size:13px;color:#8d97a5;font-weight:500">('+(picked?1:0)+'개)</span>';
}
/* ── 디자인 설정 반영 렌더 헬퍼 ── */
function dpGallery(){
  var pr=DETAIL.product, d=DETAIL.design;
  var main='<div class="dp-main-img" style="background:'+dpImg(pr.img)+'"></div>';
  var th='<div class="dp-thumbs">'+dpThumbs()+'</div>';
  if(d.imgPos==='left')  return '<div class="dp-gallery dp-gallery--side" data-detaildesign>'+th+main+'</div>';
  if(d.imgPos==='right') return '<div class="dp-gallery dp-gallery--side" data-detaildesign>'+main+th+'</div>';
  return '<div class="dp-gallery" data-detaildesign>'+main+th+'</div>';
}
function dpBuyRow(){
  var d=DETAIL.design, col=d.buyColor;
  var now='<button class="dp-now" style="background:'+col+'">지금 구매하기</button>';
  if(d.buyStyle==='vertical') return '<div class="dp-buy dp-buy--vertical">'+now+'<button class="dp-cart">장바구니</button></div>';
  if(d.buyStyle==='icon')     return '<div class="dp-buy"><button class="dp-cart dp-cart-ic" title="장바구니">🛒</button>'+now+'</div>';
  return '<div class="dp-buy"><button class="dp-cart">장바구니</button>'+now+'</div>';
}
function dpTabsBar(){
  var ts=DETAIL.design.tabs.filter(function(t){return t.show;});
  if(!ts.length) return '';
  return '<div class="dp-tabs">'+ts.map(function(t,i){ return '<button class="'+(i===0?'on':'')+'" data-dptab>'+esc(t.name)+'</button>'; }).join('')+'</div>'
    +'<div class="dp-detailbody">상품 상세설명 영역</div>';
}
function dpStickyRight(){
  var d=DETAIL.design, pr=DETAIL.product;
  return '<div class="dp-sticky-right"><div style="font-weight:800;font-size:16px;color:#2a3040;margin-bottom:12px">상품 구매</div>'
    +'<div class="dp-price" style="margin-bottom:14px"><span class="s">'+esc(pr.sale)+'</span>'+esc(pr.price)+'</div>'
    +'<button class="dp-now" style="background:'+d.buyColor+';width:100%;height:48px;border:0;border-radius:9px;color:#fff;font-weight:700;font-size:15px;cursor:pointer">지금 구매하기</button></div>';
}
function dpStickyBottom(){
  var d=DETAIL.design, pr=DETAIL.product; if(d.sticky!=='bottom') return '';
  return '<div class="dp-sticky-bottom"><span class="nm">'+esc(pr.name)+'</span>'
    +'<span class="tot">총 구매금액 <b>'+esc(pr.price)+'</b></span>'
    +'<button class="dp-cart">장바구니</button><button class="dp-now" style="background:'+d.buyColor+'">지금 구매하기</button></div>';

  var optionRow='<div class="dp-row" style="border:0;padding-bottom:4px"><div class="dp-row__lab" id="dpOptLab">'+dpOptLab()+'</div><div style="flex:1;min-width:0">'+renderDetailOption()+'</div></div>';
  var addonRow='<div class="dp-row"><div class="dp-row__lab">추가 구성 상품</div><div style="flex:1;min-width:0"><div class="dp-sel">추가 구매를 원하시면 선택하세요.<span>⌄</span></div></div></div>';
  var timerRow='<div class="dp-timer"><div class="ic">🚚</div><div><div style="font-size:13px;color:#525c6a">오늘 출발 마감까지</div><div style="font-size:16px;font-weight:700;color:#2a3040"><b>10:00:44</b> 남음</div></div><div style="margin-left:auto;color:#c9ced6">ⓘ</div></div>';
  var totalRow='<div class="dp-total"><span style="color:#525c6a;font-weight:600">총 구매금액</span><span class="amt">0 <span style="font-size:13px;color:#8d97a5;font-weight:500">(0개)</span></span></div>';
  var buyRow=dpBuyRow();

function refreshDetailOption(){ var o=document.getElementById('dpOpt'); if(o){ o.outerHTML=renderDetailOption(); var n=document.getElementById('dpOpt'); if(n) n.classList.add('sel'); } }
/* 상세페이지 서브 텍스트(제목·불릿) 인라인 편집 → 모델 반영 */
document.addEventListener('input', function(e){
  var el=e.target; if(!el||!el.dataset) return;
  if(el.dataset.dedit==='name'){ DETAIL.product.name=el.textContent; }
  else if(el.dataset.dbul!==undefined){ DETAIL.product.bullets[+el.dataset.dbul]=el.textContent; }
}, true);
/* 페이지 전환 */
function gotoPage(pg){
  if(pg===curPage) return;   /* 같은 페이지 재선택 → 아무 반응 없음 (재렌더·토스트 없음) */
  curPage=pg;
  if(pg==='detail'){ try{ if(window.coachEnd && coachKey()!=='detail') coachEnd(); }catch(e){} try{ closePanel(); }catch(e){} }
  renderCanvas();
  var _sc=document.getElementById('previewScroll'); if(_sc) _sc.scrollTop=0;   /* 페이지 이동 시에만 상단으로 */
  if(pg==='detail'){ try{ openDesignInspector(); }catch(e){} }   /* 상세페이지는 디자인 설정 패널 열린 채로 랜딩 */
  var u=$('.urlpill .u'); if(u) u.textContent = (pg==='detail')
    ? 'alphacanvasmall.cafe24.com/product/detail.html?product_no=39'
    : 'alphacanvasmall.cafe24.com/shop4/skin-skin39/?_tc_t=1782387092923';
  $$('#menuPage button').forEach(function(b){ var ck=b.querySelector('.ck'); if(ck) ck.remove(); var txt=b.textContent.trim();
    if((pg==='detail'&&txt==='상세페이지')||(pg==='main'&&txt==='메인 페이지')){ b.insertAdjacentHTML('beforeend','<span class="ck">✓</span>'); } });
}
/* 옵션 선택 인스펙터 */
var OPT_GROUPS=[['colorsize','🎨','색상·사이즈','색상과 사이즈로 고르는 상품'],['bundle','📦','묶음 패키지','구성이나 수량으로 파는 상품'],['design','🖼️','디자인·패턴','무늬·프린트를 눈으로 골라야 하는 상품'],['etc','⚙️','기타','직접 설정']];
function optGroupCards(){ return '<div class="dopt-groups">'+OPT_GROUPS.map(function(g){ return '<div class="dopt-card'+(DETAIL.opt.group===g[0]?' on':'')+'" data-dopt-group="'+g[0]+'"><div class="dopt-card__i">'+g[1]+'</div><div class="dopt-card__t">'+g[2]+'</div><div class="dopt-card__d">'+g[3]+'</div></div>'; }).join('')+'</div>'; }
function doptSw(color, attr, i){ return '<span class="dopt-sw" style="background:'+color+';position:relative;overflow:hidden"><input type="color" value="'+color+'" data-'+attr+'="'+i+'" style="position:absolute;inset:-6px;width:200%;height:200%;border:0;padding:0;opacity:0;cursor:pointer"></span>'; }
function optColorRows(){ return DETAIL.opt.colors.map(function(c,i){ return '<div style="margin-bottom:12px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:7px"><label style="font-size:12.5px;font-weight:700;color:var(--ink)">색상 '+(i+1)+'</label>'+(DETAIL.opt.colors.length>1?'<button data-dopt-delcolor="'+i+'" style="color:#9aa0a6;font-size:15px">✕</button>':'')+'</div><div class="dopt-row">'+doptSw(c.c,'dopt-ccolor',i)+'<input class="inp" value="'+escAttr(c.name)+'" data-dopt-color="'+i+'" placeholder="옵션명을 입력해주세요" /></div></div>'; }).join(''); }
function optSizeRows(){ return DETAIL.opt.sizes.map(function(x,i){ return '<div style="margin-bottom:12px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:7px"><label style="font-size:12.5px;font-weight:700;color:var(--ink)">항목명 '+(i+1)+'</label>'+(DETAIL.opt.sizes.length>1?'<button data-dopt-delsize="'+i+'" style="color:#9aa0a6;font-size:15px">✕</button>':'')+'</div><input class="inp" value="'+escAttr(x)+'" data-dopt-size="'+i+'" /></div>'; }).join(''); }
function optSizeSeg(){ return '<div class="seg2" data-dopt-sizemode style="width:140px"><button class="'+(DETAIL.opt.sizeMode==='button'?'on':'')+'" data-val="button">버튼형</button><button class="'+(DETAIL.opt.sizeMode==='list'?'on':'')+'" data-val="list">목록형</button></div>'; }
function optionPanel(){
  var pr=DETAIL.product;
  var body=accSection('상품 편집', true,
      '<label style="font-size:12px;color:var(--ink-sub);display:block;margin-bottom:6px">편집 중인 상품</label>'
      +'<div class="dopt-editprod"><span class="th" style="background:'+dpImg(pr.img)+'"></span><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:700;color:var(--ink)">'+esc(pr.eng)+'</div><div style="font-size:12px;color:var(--ink-sub)">330,000원</div></div><span style="color:#9aa0a6">⌄</span></div>')
    + accSection('옵션 디자인', true,
      '<div class="grp-label" style="display:flex;align-items:center;gap:4px">옵션 그룹 설정 <span style="color:#c9ced6">ⓘ</span></div>'
      + optGroupCards()
      + '<div style="height:16px"></div>'
      + optDesignBody());
  return { title:'옵션 선택 설정', body:body, foot:'<button class="btn-soft grow" data-dopt-del style="width:100%">위젯 삭제 ✕</button>' };
}
/* ── 옵션 디자인: 그룹 타입별 설정 본문 ── */
function optSizeBlock(){
  return '<div style="height:18px"></div>'
    + '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px"><div class="grp-label" style="margin:0">사이즈</div>'+optSizeSeg()+'</div>'
    + optSizeRows() + '<button class="addbtn" data-dopt-addsize>＋ 항목 추가</button>';
}
function optModeSeg(scope){
  var cur = scope==='design'?DETAIL.opt.patternMode:(DETAIL.opt.etcMode||'color');
  return '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px"><div class="grp-label" style="margin:0">'+(scope==='design'?'디자인·패턴 그룹 1':'기타 그룹 1')+'</div>'
   + '<div class="seg2" data-dopt-mode="'+scope+'" style="width:186px">'
   + [['색상','color'],['텍스트','text'],['이미지','image']].map(function(o){ return '<button class="'+(cur===o[1]?'on':'')+'" data-val="'+o[1]+'">'+o[0]+'</button>'; }).join('')
   + '</div></div>';
}
function optImgDrop(img, kind, i){ return '<div class="dopt-drop'+(img?' has':'')+'" data-dopt-img="'+kind+'" data-i="'+i+'" style="'+(img?'background:'+dpImg(img):'')+'">'+(img?'':'＋ 이미지 선택')+'</div>'; }
function optBundleBody(){
  return '<div class="grp-label">구성 선택</div>'
    + DETAIL.opt.bundle.map(function(b,i){
        return '<div class="dopt-item"><div class="dopt-item__hd"><b>항목 '+(i+1)+'</b>'+(DETAIL.opt.bundle.length>1?'<button data-dopt-delbundle="'+i+'">✕</button>':'')+'</div>'
          + field('항목명','<input class="inp" value="'+escAttr(b.name)+'" data-dopt-bname="'+i+'" placeholder="구성명"/>')
          + '<div class="fld"><label>뱃지</label><div class="dopt-badges" data-dopt-badge="'+i+'">'+['BEST','HOT','NEW','최대혜택'].map(function(k){ return '<button class="dopt-bchip'+(b.badge===k?' on':'')+'" data-bk="'+k+'">'+k+'</button>'; }).join('')+'</div></div>'
          + field('가격','<input class="inp" value="'+escAttr(b.price)+'" data-dopt-bprice="'+i+'" placeholder="0원"/>')
          + field('보조설명','<input class="inp" value="'+escAttr(b.sub)+'" data-dopt-bsub="'+i+'" placeholder="ex) 개당 12,000원"/>')
          + '</div>';
      }).join('')
    + '<button class="addbtn" data-dopt-addbundle>＋ 구성 추가</button>';
}
function optPatternBody(){
  var o=DETAIL.opt, mode=o.patternMode;
  var lab={color:'색상',text:'텍스트',image:'이미지'}[mode];
  return o.pattern.map(function(p,i){
      var head='<div class="dopt-item"><div class="dopt-item__hd"><b>'+lab+' '+(i+1)+'</b>'+(o.pattern.length>1?'<button data-dopt-delpat="'+i+'">✕</button>':'')+'</div>';
      var nameInp='<input class="inp" value="'+escAttr(p.name)+'" data-dopt-pname="'+i+'" placeholder="옵션명을 입력해주세요"/>';
      if(mode==='color') return head + '<div class="dopt-row">'+doptSw(p.c||'#3CD1C2','dopt-pcolor',i)+nameInp+'</div></div>';
      if(mode==='image') return head + field('이미지', optImgDrop(p.img,'pat',i)) + field('항목명', nameInp) + '</div>';
      return head + field('항목명', nameInp) + '</div>';
    }).join('')
    + '<button class="addbtn" data-dopt-addpat>＋ 항목 추가</button>';
}
function optEtcColorBody(){
  var o=DETAIL.opt, mode=o.etcMode||'color', lab={color:'색상',text:'텍스트',image:'이미지'}[mode];
  return o.colors.map(function(c,i){
      var del=o.colors.length>1?'<button data-dopt-delcolor="'+i+'" style="color:#9aa0a6;font-size:15px">✕</button>':'';
      var hd='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:7px"><label style="font-size:12.5px;font-weight:700;color:var(--ink)">'+lab+' '+(i+1)+'</label>'+del+'</div>';
      if(mode==='color') return '<div style="margin-bottom:12px">'+hd+'<div class="dopt-row">'+doptSw(c.c,'dopt-ccolor',i)+'<input class="inp" value="'+escAttr(c.name)+'" data-dopt-color="'+i+'" placeholder="옵션명을 입력해주세요" /></div></div>';
      if(mode==='image') return '<div style="margin-bottom:12px">'+hd+optImgDrop(c.img,'color',i)+'<div style="height:8px"></div><input class="inp" value="'+escAttr(c.name)+'" data-dopt-color="'+i+'" placeholder="옵션명을 입력해주세요" /></div>';
      return '<div style="margin-bottom:12px">'+hd+'<input class="inp" value="'+escAttr(c.name)+'" data-dopt-color="'+i+'" placeholder="옵션명을 입력해주세요" /></div>';
    }).join('')
    + '<button class="addbtn" data-dopt-addcolor>＋ 항목 추가</button>';
}
function optDesignBody(){
  var g=DETAIL.opt.group;
  if(g==='bundle') return optBundleBody();
  if(g==='design') return optModeSeg('design') + optPatternBody();
  if(g==='etc')    return optModeSeg('etc') + optEtcColorBody() + optSizeBlock();
  /* colorsize (기본) */
  return '<div class="grp-label">🎨 색상</div>' + optColorRows() + '<button class="addbtn" data-dopt-addcolor>＋ 색상 추가</button>' + optSizeBlock();
}

/* ===== 디자인 설정 인스펙터 (Figma 4262-17720) ===== */
function dzCard(diagram,label,val,cur,attr){ return '<div class="dz-card'+(cur===val?' on':'')+'" data-'+attr+'="'+val+'"><div class="dz-card__d">'+diagram+'</div><div class="dz-card__t">'+label+'</div></div>'; }
function dzColor(val){ return field('버튼 색상', '<div class="colorfld"><span class="sw" style="background:'+val+';position:relative;overflow:hidden"><input type="color" value="'+val+'" data-dz-buycolor style="position:absolute;inset:-6px;width:200%;height:200%;border:0;padding:0;opacity:0;cursor:pointer"></span><input class="inp" value="'+escAttr(String(val).toUpperCase())+'" data-dz-buycolor style="border:0;flex:1;min-width:0"/></div>'); }
function designPanel(){
  var d=DETAIL.design;
  var layout=accSection('레이아웃', true, '<div class="dz-cards c2">'
    + dzCard('<i style="width:58%;height:6px"></i>','기본형','basic',d.layout,'dz-layout')
    + dzCard('<i style="width:58%;height:6px"></i><i style="width:40%;height:10px"></i>','구매영역 고정형','fixed',d.layout,'dz-layout')+'</div>');
  var imgpos=accSection('상품 이미지 위치', true, '<div class="dz-cards c3">'
    + dzCard('<i style="width:60%;height:24px"></i>','하단','bottom',d.imgPos,'dz-imgpos')
    + dzCard('<i style="width:16%;height:24px"></i><i style="width:46%;height:24px"></i>','좌측','left',d.imgPos,'dz-imgpos')
    + dzCard('<i style="width:46%;height:24px"></i><i style="width:16%;height:24px"></i>','우측','right',d.imgPos,'dz-imgpos')+'</div>');
  var buy=accSection('구매하기 버튼', true, '<div class="dz-cards c3">'
    + dzCard('<i style="width:28%;height:12px"></i><i style="width:40%;height:12px"></i>','기본형','basic',d.buyStyle,'dz-buystyle')
    + dzCard('<i style="width:16%;height:12px"></i><i style="width:44%;height:12px"></i>','아이콘+버튼형','icon',d.buyStyle,'dz-buystyle')
    + dzCard('<i style="width:60%;height:8px"></i><i style="width:60%;height:8px"></i>','세로형','vertical',d.buyStyle,'dz-buystyle')+'</div>'
    + dzColor(d.buyColor));
  var sticky=accSection('스크롤 시 고정', true,
    '<div class="dz-info">ⓘ 캔버스를 스크롤해서 고정 동작을 확인해보세요. PC 화면에서만 확인 가능해요.</div>'
    + '<div class="dz-cards c3">'
    + dzCard('<i style="width:26%;height:26px"></i>','우측 고정','right',d.sticky,'dz-sticky')
    + dzCard('<i style="width:60%;height:10px"></i>','하단 고정','bottom',d.sticky,'dz-sticky')
    + dzCard('<i style="width:50%;height:6px"></i>','적용 안 함','none',d.sticky,'dz-sticky')+'</div>');
  var tabs=accSection('탭 순서·노출', true,
    d.tabs.map(function(t,i){ return '<div class="dz-tab'+(t.show?'':' off')+'"><span class="gr">⣿</span>'
      +'<input value="'+escAttr(t.name)+'" data-dz-tabname="'+i+'" placeholder="탭 이름"/>'
      +'<button data-dz-tabup="'+i+'" title="위로">↑</button><button data-dz-tabdown="'+i+'" title="아래로">↓</button>'
      +'<button class="eye'+(t.show?' on':'')+'" data-dz-tabshow="'+i+'" title="노출/숨김">'+(t.show?'👁':'🚫')+'</button>'
      +'<button data-dz-tabdel="'+i+'" title="삭제">✕</button></div>'; }).join('')
    + '<button class="addbtn" data-dz-tabadd>＋ 탭 항목 추가</button>'
    + '<div class="help">탭은 최소 1개, 최대 5개까지 노출돼야 해요.</div>');
  return { title:'디자인 설정', body: layout+imgpos+buy+sticky+tabs, foot:'<button class="btn-soft grow" data-dz-close style="width:100%">닫기</button>' };
}
function openDesignInspector(){ renderPanel(designPanel()); panel.classList.add('open'); }
/* 디자인 설정 이벤트 */
document.addEventListener('click', function(e){
  if(!e.target.closest('#panel')) return; var t, d=DETAIL.design;
  if((t=e.target.closest('[data-dz-layout]'))){ d.layout=t.dataset.dzLayout; renderCanvas(); renderPanel(designPanel()); return; }
  if((t=e.target.closest('[data-dz-imgpos]'))){ d.imgPos=t.dataset.dzImgpos; renderCanvas(); renderPanel(designPanel()); return; }
  if((t=e.target.closest('[data-dz-buystyle]'))){ d.buyStyle=t.dataset.dzBuystyle; renderCanvas(); renderPanel(designPanel()); return; }
  if((t=e.target.closest('[data-dz-sticky]'))){ d.sticky=t.dataset.dzSticky; renderCanvas(); renderPanel(designPanel()); return; }
  if((t=e.target.closest('[data-dz-tabup]'))){ var i=+t.dataset.dzTabup; if(i>0){ var a=d.tabs; var x=a[i];a[i]=a[i-1];a[i-1]=x; renderCanvas(); renderPanel(designPanel()); } return; }
  if((t=e.target.closest('[data-dz-tabdown]'))){ var i2=+t.dataset.dzTabdown; if(i2<d.tabs.length-1){ var a2=d.tabs; var y=a2[i2];a2[i2]=a2[i2+1];a2[i2+1]=y; renderCanvas(); renderPanel(designPanel()); } return; }
  if((t=e.target.closest('[data-dz-tabshow]'))){ var i3=+t.dataset.dzTabshow; var vis=d.tabs.filter(function(x){return x.show;}).length; if(d.tabs[i3].show && vis<=1){ toast('탭은 최소 1개 노출돼야 해요'); return; } d.tabs[i3].show=!d.tabs[i3].show; renderCanvas(); renderPanel(designPanel()); return; }
  if((t=e.target.closest('[data-dz-tabdel]'))){ if(d.tabs.length>1){ d.tabs.splice(+t.dataset.dzTabdel,1); renderCanvas(); renderPanel(designPanel()); } else toast('최소 1개 항목이 필요해요'); return; }
  if((t=e.target.closest('[data-dz-tabadd]'))){ var shown=d.tabs.filter(function(x){return x.show;}).length; d.tabs.push({name:'새 탭', show:shown<5}); renderCanvas(); renderPanel(designPanel()); return; }
  if((t=e.target.closest('[data-dz-close]'))){ closePanel(); return; }
});
document.addEventListener('input', function(e){
  var el=e.target; if(!el||!el.dataset) return; var d=DETAIL.design;
  if(el.dataset.dzTabname!==undefined){ d.tabs[+el.dataset.dzTabname].name=el.value; renderCanvas(); }
  else if(el.dataset.dzBuycolor!==undefined){ d.buyColor=el.value; renderCanvas(); var box=el.closest('.colorfld'); if(box){ var sw=box.querySelector('.sw'); if(sw) sw.style.background=el.value; } }
});
/* ── 이벤트 ── */
document.addEventListener('click', function(e){   /* 상품 클릭 → 상세 (캡처) */
  if(curPage!=='main') return; var pc=e.target.closest('[data-prod]'); if(!pc) return;
  var sf=document.getElementById('sfcanvas'); if(!sf||!sf.contains(pc)) return;
  e.stopPropagation(); gotoPage('detail'); toast('상품 상세페이지로 이동했어요');
}, true);
document.addEventListener('click', function(e){   /* GNB 페이지 메뉴 (캡처) */
  var b=e.target.closest('#menuPage button'); if(!b) return; var txt=b.textContent.replace('✓','').trim();
  if(txt==='상세페이지'){ e.stopPropagation(); var wasDetailStep=(coachKey()==='detail'); gotoPage('detail'); $('#menuPage').classList.remove('open'); if(wasDetailStep) setTimeout(function(){ if(coachKey()==='detail') coachShow(coachIdx+1); }, 80); }
  else if(txt==='메인 페이지'){ e.stopPropagation(); gotoPage('main'); $('#menuPage').classList.remove('open'); }
}, true);
document.addEventListener('click', function(e){   /* 상세 내부 상호작용 */
  var t;
  if((t=e.target.closest('[data-gohome]'))){ gotoPage('main'); return; }
  if((t=e.target.closest('#sfcanvas .dp-thumb'))){ var ths=$$('#sfcanvas .dp-thumb'); var i=ths.indexOf(t); if(i>=0){ DETAIL.product.img=DETAIL.product.thumbs[i]; var m=$('#sfcanvas .dp-main-img'); if(m) m.style.background=dpImg(DETAIL.product.thumbs[i]); ths.forEach(function(x){x.classList.remove('on');}); t.classList.add('on'); } return; }
  if((t=e.target.closest('#sfcanvas [data-detaildesign]'))){ openDesignInspector(); return; }
  if((t=e.target.closest('#sfcanvas [data-dbundle]'))){ DETAIL.opt.sel=+t.dataset.dbundle; var bx=t.closest('.dp-bundle'); if(bx) $$('.dp-bopt',bx).forEach(function(x){ x.classList.toggle('sel', x===t); }); dpUpdateTotal(); }
  if((t=e.target.closest('#sfcanvas [data-dgi]'))){ DETAIL.opt.sel=+t.dataset.dgi; var pn=t.parentNode; if(pn) Array.prototype.forEach.call(pn.children,function(x){ x.classList&&x.classList.toggle('sel', x===t); }); dpUpdateTotal(); }
  if((t=e.target.closest('#sfcanvas [data-dsize]'))){ DETAIL.opt.sizeSel=+t.dataset.dsize; var sp=t.parentNode; if(sp) Array.prototype.forEach.call(sp.children,function(x){ x.classList&&x.classList.toggle('sel', x===t); }); dpUpdateTotal(); }
  if((t=e.target.closest('[data-detailopt]'))){ openOptionInspector(); return; }
});
document.addEventListener('click', function(e){   /* 옵션 인스펙터 */
  if(!e.target.closest('#panel')) return; var t;
  if((t=e.target.closest('[data-dopt-group]'))){ DETAIL.opt.group=t.dataset.doptGroup; DETAIL.opt.sel=-1; DETAIL.opt.sizeSel=-1; renderPanel(optionPanel()); refreshDetailOption(); var lb=document.getElementById('dpOptLab'); if(lb) lb.textContent=dpOptLab(); dpUpdateTotal(); return; }
  if((t=e.target.closest('[data-dopt-mode] button'))){ var sc=t.closest('[data-dopt-mode]').dataset.doptMode; DETAIL.opt.sel=-1; if(sc==='design') DETAIL.opt.patternMode=t.dataset.val; else DETAIL.opt.etcMode=t.dataset.val; renderPanel(optionPanel()); refreshDetailOption(); return; }
  if((t=e.target.closest('[data-dopt-sizemode] button'))){ DETAIL.opt.sizeMode=t.dataset.val; renderPanel(optionPanel()); refreshDetailOption(); return; }
  if((t=e.target.closest('.dopt-badges .dopt-bchip'))){ var bi=+t.closest('[data-dopt-badge]').dataset.doptBadge, k=t.dataset.bk; DETAIL.opt.bundle[bi].badge=(DETAIL.opt.bundle[bi].badge===k)?'':k; renderPanel(optionPanel()); refreshDetailOption(); return; }
  if((t=e.target.closest('[data-dopt-img]'))){ var pool=[IMG.nightcream,IMG.focus,IMG.balance,IMG.radiance,IMG.rv1,IMG.rv2]; var ii=+t.dataset.i, pk=pool[ii%pool.length]; if(t.dataset.doptImg==='pat') DETAIL.opt.pattern[ii].img=pk; else DETAIL.opt.colors[ii].img=pk; renderPanel(optionPanel()); refreshDetailOption(); return; }
  if((t=e.target.closest('[data-dopt-addbundle]'))){ DETAIL.opt.bundle.push({name:'',badge:'',price:'',sub:''}); renderPanel(optionPanel()); refreshDetailOption(); return; }
  if((t=e.target.closest('[data-dopt-delbundle]'))){ if(DETAIL.opt.bundle.length>1){ DETAIL.opt.bundle.splice(+t.dataset.doptDelbundle,1); renderPanel(optionPanel()); refreshDetailOption(); dpUpdateTotal(); } else toast('최소 1개 항목이 필요해요'); return; }
  if((t=e.target.closest('[data-dopt-addpat]'))){ DETAIL.opt.pattern.push({img:'',name:'',c:'#607afb'}); renderPanel(optionPanel()); refreshDetailOption(); return; }
  if((t=e.target.closest('[data-dopt-delpat]'))){ if(DETAIL.opt.pattern.length>1){ DETAIL.opt.pattern.splice(+t.dataset.doptDelpat,1); renderPanel(optionPanel()); refreshDetailOption(); } else toast('최소 1개 항목이 필요해요'); return; }
  if((t=e.target.closest('[data-dopt-addcolor]'))){ var pal=['#3CD1C2','#F5B301','#F0483E','#6d58f2','#2a3040','#F59FB5','#7FB77E']; DETAIL.opt.colors.push({c:pal[DETAIL.opt.colors.length%pal.length],name:''}); renderPanel(optionPanel()); refreshDetailOption(); return; }
  if((t=e.target.closest('[data-dopt-delcolor]'))){ if(DETAIL.opt.colors.length>1){ DETAIL.opt.colors.splice(+t.dataset.doptDelcolor,1); renderPanel(optionPanel()); refreshDetailOption(); } else toast('최소 1개 항목이 필요해요'); return; }
  if((t=e.target.closest('[data-dopt-addsize]'))){ DETAIL.opt.sizes.push('새 항목'); renderPanel(optionPanel()); refreshDetailOption(); return; }
  if((t=e.target.closest('[data-dopt-delsize]'))){ if(DETAIL.opt.sizes.length>1){ DETAIL.opt.sizes.splice(+t.dataset.doptDelsize,1); renderPanel(optionPanel()); refreshDetailOption(); } else toast('최소 1개 항목이 필요해요'); return; }
  if((t=e.target.closest('[data-dopt-del]'))){ try{closePanel();}catch(e2){} toast('옵션 위젯을 삭제했어요'); return; }
});
document.addEventListener('input', function(e){
  var el=e.target; if(!el.dataset) return;
  if(el.dataset.doptCcolor!==undefined){ DETAIL.opt.colors[+el.dataset.doptCcolor].c=el.value; var sw=el.closest('.dopt-sw'); if(sw) sw.style.background=el.value; refreshDetailOption(); }
  else if(el.dataset.doptPcolor!==undefined){ DETAIL.opt.pattern[+el.dataset.doptPcolor].c=el.value; var sw2=el.closest('.dopt-sw'); if(sw2) sw2.style.background=el.value; refreshDetailOption(); }
  else if(el.dataset.doptColor!==undefined){ DETAIL.opt.colors[+el.dataset.doptColor].name=el.value; refreshDetailOption(); }
  else if(el.dataset.doptSize!==undefined){ var i=+el.dataset.doptSize; DETAIL.opt.sizes[i]=el.value; if(DETAIL.opt.sizeMode==='list'){ refreshDetailOption(); } else { var bs=$$('#sfcanvas #dpOpt .dp-size'); if(bs[i]) bs[i].textContent=el.value; } }
  else if(el.dataset.doptBname!==undefined){ DETAIL.opt.bundle[+el.dataset.doptBname].name=el.value; refreshDetailOption(); }
  else if(el.dataset.doptBprice!==undefined){ DETAIL.opt.bundle[+el.dataset.doptBprice].price=el.value; refreshDetailOption(); dpUpdateTotal(); }
  else if(el.dataset.doptBsub!==undefined){ DETAIL.opt.bundle[+el.dataset.doptBsub].sub=el.value; refreshDetailOption(); }
  else if(el.dataset.doptPname!==undefined){ DETAIL.opt.pattern[+el.dataset.doptPname].name=el.value; refreshDetailOption(); }
});
/* 사이즈 목록형 캔버스 드롭다운 선택 → 항목명 적용 + 총액 반영 */
document.addEventListener('change', function(e){
  var el=e.target; if(!el||!el.dataset) return;
  if(el.dataset.dsizesel!==undefined){ DETAIL.opt.sizeSel=+el.value; el.style.color=(DETAIL.opt.sizeSel<0?'#8d97a5':'#2a3040'); dpUpdateTotal(); }
});
function applyTransHead(){
  var w=document.querySelector('#sfcanvas .sfw--transhead'); if(w){ w.style.marginBottom=(-w.offsetHeight)+'px'; }
  var dh=document.querySelector('#sfcanvas .dp > .sfhdr.is-transparent'); if(dh){ dh.style.position='sticky'; dh.style.top='0'; dh.style.zIndex='30'; dh.style.marginBottom=(-dh.offsetHeight)+'px'; }
}
function renderCanvas(){ var c=$('#sfcanvas'); if(!c) return;
  var sc=document.getElementById('previewScroll'), st=sc?sc.scrollTop:0;   /* 재렌더 시 스크롤 위치 보존(패널 수정 시 상단 튐 방지) */
  if(curPage==='detail'){ c.innerHTML=renderDetailPage(); if(sc) sc.scrollTop=st; applyTransHead(); return; }
  var html='';
  html+=sfw('header','헤더', renderHeader());
  PAGE.widgets.forEach(function(w,i){ html+=sfw('widget:'+i, widgetLabel(w), renderWidgetBody(w)); });
  html+=sfw('footer','푸터', renderFooter());
  c.innerHTML=html;
  if(sc) sc.scrollTop=st;
  applyTransHead();
  if(typeof onParallax==='function') onParallax();
}
function refreshHero(){ var wrap=$('#sfcanvas .sfw[data-kind="hero"]'); if(wrap){ var n=wrap.querySelector('.sfhero'); if(n) n.outerHTML=renderHero(); } }
function heroGo(dir){ var n=PAGE.hero.slides.length; PAGE.hero.cur=(PAGE.hero.cur+(dir==='next'?1:n-1))%n; refreshHero(); }
function syncHeroText(b,v){ var map={eyebrow:'.sfhero__eyebrow',title:'.sfhero__title',desc:'.sfhero__desc',btn:'.sfhero__btn'}; var el=$('#sfcanvas '+map[b]); if(el) el.textContent=v; }
function refreshFooter(){ var wrap=$('#sfcanvas .sfw[data-kind="footer"]'); if(wrap){ var n=wrap.querySelector('.sffoot'); if(n) n.outerHTML=renderFooter(); } }
function refreshWidget(i){
  var wrap=$('#sfcanvas .sfw[data-kind="widget:'+i+'"]'); if(!wrap) return;
  var n=wrap.querySelector('.bsec');
  if(n){ n.outerHTML=renderWidgetBody(PAGE.widgets[i]); }
  else { /* .bsec 없는 위젯(스크롤 배너·영상 등)은 노드 전체 교체 */
    var wasSel=wrap.classList.contains('sel');
    var tmp=document.createElement('div'); tmp.innerHTML=sfw('widget:'+i, widgetLabel(PAGE.widgets[i]), renderWidgetBody(PAGE.widgets[i]));
    var nu=tmp.firstChild; if(wasSel) nu.classList.add('sel'); wrap.parentNode.replaceChild(nu, wrap);
  }
  if(typeof onParallax==='function') onParallax();
}

function fldLbl(t){ return '<div class="fld"><label style="display:block;font-size:12.5px;font-weight:700;color:var(--ink);margin-bottom:8px">'+t+'</label>'; }
function selectWidget(kind){ $$('#sfcanvas .sfw').forEach(function(x){ x.classList.toggle('sel', x.dataset.kind===kind); }); openLiveInspector(kind); }
function openLiveInspector(kind){
  var def;
  if(kind==='hero'){
    var h=PAGE.hero, s=h.slides[h.cur];
    var picks=HERO_IMAGES.map(function(u){ return '<span class="t'+((s.img===u)?' on':'')+'" data-pickimg="'+u+'" style="background-image:url(\''+u+'\')"></span>'; }).join('');
    def={ title:'히어로 배너', note:'', body:
        fldLbl('배너 이미지')+'<div class="sfpick">'+picks+'</div><div class="help" style="margin-top:6px">실제 이미지는 나중에 URL로 교체돼요</div></div>'
      + fldLbl('소제목')+'<input class="inp" data-bind="eyebrow" value="'+esc(s.eyebrow)+'"/></div>'
      + fldLbl('제목')+'<input class="inp" data-bind="title" value="'+esc(s.title)+'"/></div>'
      + fldLbl('설명')+'<textarea class="inp" data-bind="desc">'+esc(s.desc)+'</textarea></div>'
      + fldLbl('버튼 텍스트')+'<input class="inp" data-bind="btn" value="'+esc(s.btn)+'"/></div>'
      + fldLbl('글자 크기 · <span class="val">'+h.size+'px</span>')+'<input type="range" min="18" max="52" value="'+h.size+'" data-size style="width:100%"/></div>'
      + fldLbl('글자 색')+'<div class="swrow"><span class="s'+(h.color==='#ffffff'?' on':'')+'" data-color="#ffffff" style="background:#fff"></span><span class="s'+(h.color==='#222222'?' on':'')+'" data-color="#222222" style="background:#222"></span><span class="s'+(h.color==='#837aff'?' on':'')+'" data-color="#837aff" style="background:#837aff"></span></div></div>'
      + fldLbl('배너 너비')+'<div class="seg3"><button class="'+(h.width==='100%'?'on':'')+'" data-width="100%">전체 너비</button><button class="'+(h.width==='70%'?'on':'')+'" data-width="70%">콘텐츠 영역</button></div></div>'
    };
  } else if(kind==='header'){
    def={ title:'헤더', body: fldLbl('로고 텍스트')+'<input class="inp" data-bind="logo" value="'+esc(PAGE.header.logo)+'"/></div>' };
  } else if(kind==='footer'){
    def={ title:'푸터', body: fldLbl('상호명')+'<input class="inp" data-bind="fname" value="'+esc(PAGE.footer.name)+'"/></div>'+fldLbl('고객센터')+'<input class="inp" data-bind="ftel" value="'+esc(PAGE.footer.tel)+'"/></div>' };
  } else if(kind.indexOf('widget:')===0){
    var idx=+kind.split(':')[1], w=PAGE.widgets[idx];
    if(w.type==='contentbanner'){ def=contentBannerPanel(idx,w); }
    else if(w.type==='contentgrid'){ def=contentGridPanel(idx,w); }
    else if(w.type==='sale'){ def=categoryTabPanel(idx,w); }
    else if(w.type==='photoreview'){ def=photoReviewPanel(idx,w); }
    else if(w.type==='video'||w.type==='ytlinks'){ def=videoBannerPanel(idx,w); }
    else if(w.type==='brandbanner'){ def=scrollBannerPanel(idx,w); }
    else if(w.type==='product'||w.type==='category'){
      def={ title:widgetLabel(w), body: fldLbl('제목')+'<input class="inp" data-bind="wtitle" data-widx="'+idx+'" value="'+esc(w.title)+'"/></div><div class="help">항목·이미지는 실제 데이터 연결 시 반영돼요</div>' };
    } else if(w.type==='text'){
      def={ title:'텍스트', body: fldLbl('제목')+'<input class="inp" data-bind="wtitle" data-widx="'+idx+'" value="'+esc(w.title)+'"/></div>'+fldLbl('설명')+'<textarea class="inp" data-bind="wdesc" data-widx="'+idx+'">'+esc(w.desc)+'</textarea></div>' };
    } else {
      def={ title:widgetLabel(w), body:'<div class="help">이 위젯이 캔버스에 추가됐어요.\n캔버스에서 텍스트·이미지를 클릭해 편집해보세요.</div>' };
    }
    if(def && !def.note){ var _h=firstHint(w.type); if(_h) def.note=_h; }
  } else return;
  renderPanel(def); panel.classList.add('open');
}

/* canvas: select + hero nav */
$('#sfcanvas').addEventListener('click', function(e){

document.addEventListener('click', function(e){
  var t;
  if((t=e.target.closest('[data-list-add]'))){ var i=+t.dataset.widx, arr=cgGet(PAGE.widgets[i], t.dataset.listAdd); if(Array.isArray(arr)){ arr.push(listTpl(t.dataset.tpl)); refreshWidget(i); selectWidget('widget:'+i); } return; }
  if((t=e.target.closest('[data-list-del]'))){ var i2=+t.dataset.widx, w2=PAGE.widgets[i2], arr2=cgGet(w2, t.dataset.listDel); if(Array.isArray(arr2)&&arr2.length>1){ arr2.splice(+t.dataset.i,1); if(w2.active>=arr2.length) w2.active=Math.max(0,arr2.length-1); refreshWidget(i2); selectWidget('widget:'+i2); } else toast('최소 1개 항목이 필요해요'); return; }
  if((t=e.target.closest('[data-list-mv]'))){ var i3=+t.dataset.widx, arr3=cgGet(PAGE.widgets[i3], t.dataset.listMv), k=+t.dataset.i, j=k+(t.dataset.dir==='up'?-1:1); if(Array.isArray(arr3)&&j>=0&&j<arr3.length){ var x=arr3[k];arr3[k]=arr3[j];arr3[j]=x; refreshWidget(i3); selectWidget('widget:'+i3); } return; }
});
/* ===== 스크롤 배너 패럴랙스 ===== */
var _paraRAF=0;
function updateParallax(){
  var sc=document.getElementById('previewScroll'); if(!sc) return;
  var scr=sc.getBoundingClientRect(), vh=sc.clientHeight;
  document.querySelectorAll('#sfcanvas .sbn').forEach(function(b){
    var img=b.querySelector('.sbn__img'); if(!img) return;
    var r=b.getBoundingClientRect();
    var prog=(scr.top+vh-r.top)/(vh+r.height); prog=Math.max(0,Math.min(1,prog));
    img.style.transform='translateY('+((prog-0.5)*160).toFixed(1)+'%)';   /* ±80% → 2배 속도 */
  });
}
function onParallax(){ if(_paraRAF) return; _paraRAF=requestAnimationFrame(function(){ _paraRAF=0; updateParallax(); }); }
(function(){ var sc=document.getElementById('previewScroll'); if(sc) sc.addEventListener('scroll', onParallax, {passive:true}); window.addEventListener('resize', onParallax); })();
/* 첫 진입: 딤/팝업 없이 바로 빌더 → 가이드 코치 자동 실행 (GNB 도움말로 재실행) */
(function(){
  var wc=document.getElementById('welcome'); if(wc) wc.setAttribute('hidden','');
  // 임베드(상세페이지): 화면에 맞춰 축소돼 스크롤이 불필요 → scrollIntoView 무효화해 부모 페이지 침범 원천 차단
  if(/[?&]embed/.test(location.search)){
    try{ Element.prototype.scrollIntoView = function(){}; }catch(e){}
    try{ Element.prototype.scrollIntoViewIfNeeded = function(){}; }catch(e){}
    /* focus() 유발 스크롤도 부모 프레임을 끌어당기므로 embed에선 preventScroll 강제 */
    try{ var _acFocus = HTMLElement.prototype.focus; HTMLElement.prototype.focus = function(o){ try{ return _acFocus.call(this, {preventScroll:true}); }catch(e){ return _acFocus.call(this); } }; }catch(e){}
  }
  // 코치 자동 실행: 단독·임베드 모두 (부모 스크롤 침범은 위에서 차단)
  window.addEventListener('load', function(){ setTimeout(function(){ try{ coachStart(); }catch(e){} }, 700); });
})();
window.addEventListener('load', function(){ setTimeout(updateParallax, 200); });
</script>

<!-- ===== 7일 무료 체험 팝업 (독립 오버레이 · 원본 투어/위젯 로직 무수정) ===== -->
<style>
  .trial-dim{ position:fixed; inset:0; z-index:100000; background:rgba(20,22,28,.55);
    display:flex; align-items:center; justify-content:center; padding:24px;
    opacity:0; pointer-events:none; transition:opacity .3s ease; }
  .trial-dim.show{ opacity:1; pointer-events:auto; }
  .trial-card{ position:relative; width:330px; max-width:calc(100vw - 32px);
    transform:translateY(12px) scale(.98); transition:transform .32s cubic-bezier(0,0,.2,1); }
  .trial-dim.show .trial-card{ transform:none; }
  .trial-card a{ display:block; }
  .trial-card img{ display:block; width:100%; height:auto; border-radius:20px; box-shadow:0 24px 60px rgba(0,0,0,.34); }
  .trial-close{ position:absolute; top:12px; right:12px; width:30px; height:30px; border-radius:50%;
    background:rgba(0,0,0,.5); color:#fff; border:none; cursor:pointer; font-size:15px; line-height:1;
    display:flex; align-items:center; justify-content:center; z-index:2; }
  .trial-fab{ position:fixed; right:22px; bottom:22px; z-index:99990; display:inline-flex; align-items:center; gap:7px;
    font-family:inherit; font-size:14px; font-weight:700; color:#fff; text-decoration:none; cursor:pointer; border:none;
    background:linear-gradient(90deg,#00A05B,#37d183); padding:13px 20px; border-radius:999px;
    box-shadow:0 12px 28px rgba(0,160,91,.45); animation:trialBob 2.4s ease-in-out infinite; }
  .trial-fab:hover{ filter:brightness(1.06); animation-play-state:paused; }
  @keyframes trialBob{ 0%,100%{ transform:translateY(0) } 50%{ transform:translateY(-7px) } }
  .trial-reset{ position:fixed; left:16px; bottom:16px; z-index:99990; font-family:inherit; font-size:11.5px;
    font-weight:600; color:#fff; background:rgba(23,23,26,.82); border:none; cursor:pointer; padding:7px 11px;
    border-radius:999px; box-shadow:0 4px 14px rgba(0,0,0,.24); opacity:.7; }
  .trial-reset:hover{ opacity:1; }
  @media(max-width:640px){
    .trial-dim{ align-items:flex-end; padding:0; }
    .trial-card{ width:100%; max-width:100%; transform:translateY(100%); }
    .trial-dim.show .trial-card{ transform:none; }
    .trial-card img{ border-radius:20px 20px 0 0; }
  }
</style>
<div class="trial-dim" id="trialPopup" role="dialog" aria-modal="true" aria-label="7일 무료 체험 안내">
  <div class="trial-card">
    <button class="trial-close" aria-label="닫기">✕</button>
    <a id="trialCta" href="https://docs.google.com/forms/d/e/1FAIpQLSdj6fUH-aHdF-hfzIxFwcDFp3jpGqmbC-mOJT9ZYbgSHD_Isw/viewform" target="_blank" rel="noopener">
      <img src="assets/trial-offer.jpg" alt="7일 무료 체험 신청">
    </a>
  </div>
</div>
<a class="trial-fab" id="trialFab" href="https://docs.google.com/forms/d/e/1FAIpQLSdj6fUH-aHdF-hfzIxFwcDFp3jpGqmbC-mOJT9ZYbgSHD_Isw/viewform" target="_blank" rel="noopener">🎁 7일간 무료 체험 신청하러가기</a>
<button class="trial-reset" id="trialReset" title="데모용: 트리거 초기화">🔄 리셋</button>
<script>
  (function(){
    var EMBED = /[?&]embed=1/.test(location.search) || document.documentElement.classList.contains('embed');
    var dim=document.getElementById('trialPopup'); if(!dim) return;
    var fab=document.getElementById('trialFab'), reset=document.getElementById('trialReset');
    var closeBtn=dim.querySelector('.trial-close'), cta=document.getElementById('trialCta');
    // 임베드(상세페이지용): 코치마크는 유지하되 팝업·"신청하러가기" 플로팅 버튼은 숨김 (변형①)
    if(EMBED){ if(fab) fab.style.display='none'; if(reset) reset.style.display='none'; }
    var sf=document.getElementById('sfcanvas');
    function coaching(){ return !!(sf && sf.classList.contains('coaching')); }
    var fired=false;   // 자동 노출은 페이지 로드당 1회 (새로고침하면 다시 노출 · 영구 저장 안 함)
    function open(){ if(EMBED||dim.classList.contains('show')) return; fired=true; dim.classList.add('show'); }
    function close(){ dim.classList.remove('show'); }
    function autoOpen(){ if(!EMBED && !fired) open(); }
    closeBtn && closeBtn.addEventListener('click', close);
    dim.addEventListener('click', function(e){ if(e.target===dim) close(); });
    cta && cta.addEventListener('click', close);
    // 우하단 플로팅 버튼(항상 노출)은 <a>라서 클릭 시 구글 폼으로 바로 이동

    /* ── 트리거 ①: 온레일 투어 완주 직후 (바깥에서 감지) ── */
    var reachedLast=false, wasCoaching=false;
    new MutationObserver(function(){        // 코치 말풍선 감시: 마지막 스텝 도달 여부
      var tip=document.querySelector('.coach');
      if(tip){ var d=tip.querySelectorAll('.coach__dots i'); if(d.length && d[d.length-1].classList.contains('on')) reachedLast=true; }
    }).observe(document.body, {childList:true});
    if(sf){
      new MutationObserver(function(){      // .coaching 해제 = 투어 종료 → 완주였으면 팝업
        var now=coaching();
        if(wasCoaching && !now){ if(reachedLast) setTimeout(autoOpen,500); reachedLast=false; }
        wasCoaching=now;
      }).observe(sf, {attributes:true, attributeFilter:['class']});
    }

    /* ── 트리거 ②: 자유 편집 4회 (투어 완주와 무관 · 진행 중이든 아니든 카운트) ── */
    var edits=0;
    function bump(){ if(EMBED||fired) return; if(++edits>=4) autoOpen(); }
    document.addEventListener('focusin', function(e){ var t=e.target; if(t&&t.hasAttribute&&t.hasAttribute('contenteditable')) t.__v0=t.textContent; });
    document.addEventListener('focusout', function(e){ var t=e.target; if(t&&t.hasAttribute&&t.hasAttribute('contenteditable')&&t.__v0!==undefined&&t.textContent!==t.__v0) bump(); });
    document.addEventListener('change', function(e){ if(e.target.closest && e.target.closest('#panel')) bump(); });
    document.addEventListener('click', function(e){ if(!e.target.closest) return; if(e.target.closest('#panel .sfpick .t') || e.target.closest('#wgrid .wcard')) bump(); });

    /* 데모용 리셋 */
    reset && reset.addEventListener('click', function(){ fired=false; edits=0; dim.classList.remove('show'); });
    if(EMBED){ if(fab) fab.style.display='none'; if(reset) reset.style.display='none'; }
  })();
</script>
</body>
</html>
